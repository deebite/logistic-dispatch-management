spring.application.name=logistics-dispatch-management


spring.datasource.url=jdbc:postgresql://localhost:5432/logistic_dispatch_management
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
#logging.level.org.springframework.security=DEBUG

#pool size
spring.datasource.hikari.pool-name=DispatchPool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000

# Hibernate logging
logging.level.org.hibernate=ERROR
logging.level.org.hibernate.orm.jdbc.bind=OFF

qr-images.store.path=src/main/resources/static/qr-images/